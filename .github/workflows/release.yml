name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build skill zip
        run: |
          mkdir jetcite-skill
          cp jetcite_tool.py jetcite-skill/
          cp SKILL.md jetcite-skill/
          cp README.md jetcite-skill/
          mkdir -p jetcite-skill/src
          cp -r src/jetcite jetcite-skill/src/jetcite
          cd jetcite-skill && zip -r ../jetcite-skill-${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: jetcite-skill-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
